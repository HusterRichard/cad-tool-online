<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">CadToolOnline Technical Architecture</title>
  <desc id="desc">VSCode Extension Host, Webview application, OCCT WASM geometry engine, Three.js viewer, MaxGraph topology, and data flow for STEP import and scene delivery.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="panelOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fed7aa"/>
    </linearGradient>
    <linearGradient id="panelGray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .panel-title { font: 700 24px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .box-title { font: 700 20px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .box-text { font: 400 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .tiny { font: 400 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .badge { font: 700 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #1e293b; }
      .flow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 8; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="72" y="64" class="title">CadToolOnline 技术架构图</text>
  <text x="72" y="96" class="subtitle">VSCode Extension Host + Webview Thick Client + OCCT WASM Geometry Engine</text>

  <rect x="56" y="128" rx="24" ry="24" width="1488" height="794" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>

  <rect x="88" y="164" rx="20" ry="20" width="320" height="720" fill="url(#panelOrange)" stroke="#fdba74" stroke-width="2"/>
  <text x="112" y="206" class="panel-title">1. VSCode Extension Host</text>

  <rect x="112" y="232" rx="16" ry="16" width="272" height="110" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="266" class="box-title">Command Entry</text>
  <text x="132" y="294" class="box-text">`src/extension.ts`</text>
  <text x="132" y="320" class="tiny">Open CAD Editor / 命令注册 / 生命周期</text>

  <rect x="112" y="362" rx="16" ry="16" width="272" height="128" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="396" class="box-title">Panel Bridge</text>
  <text x="132" y="424" class="box-text">`src/panels/CadEditorPanel.ts`</text>
  <text x="132" y="450" class="tiny">创建 Webview / 注入资源 URI</text>
  <text x="132" y="472" class="tiny">Extension ↔ Webview 消息桥</text>

  <rect x="112" y="512" rx="16" ry="16" width="272" height="138" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="546" class="box-title">Native Capability</text>
  <text x="132" y="574" class="box-text">本地文件读取 / 保存 / 对话框</text>
  <text x="132" y="600" class="tiny">STEP 文件字节流</text>
  <text x="132" y="622" class="tiny">配置导入导出</text>

  <rect x="112" y="674" rx="16" ry="16" width="272" height="170" fill="#ffffff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="132" y="708" class="box-title">Artifacts</text>
  <text x="132" y="736" class="box-text">STEP / cadtool.config.json</text>
  <text x="132" y="762" class="box-text">测试命令 / 日志 / VSIX</text>
  <text x="132" y="788" class="tiny">输入与输出都由扩展宿主管理</text>

  <rect x="444" y="164" rx="20" ry="20" width="760" height="720" fill="url(#panelBlue)" stroke="#93c5fd" stroke-width="2"/>
  <text x="468" y="206" class="panel-title">2. Webview Application</text>

  <rect x="470" y="232" rx="16" ry="16" width="708" height="94" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="492" y="266" class="box-title">Frontend Shell</text>
  <text x="492" y="294" class="box-text">`src/webview/main.ts` 负责状态、Ribbon、模型树、属性面板、场景交互</text>

  <rect x="470" y="350" rx="16" ry="16" width="216" height="168" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="492" y="384" class="box-title">UI &amp; State</text>
  <text x="492" y="412" class="box-text">Ribbon / Tree / Properties</text>
  <text x="492" y="438" class="tiny">场景状态机</text>
  <text x="492" y="460" class="tiny">对象选择联动</text>
  <text x="492" y="482" class="tiny">场景级交付闭环</text>

  <rect x="718" y="350" rx="16" ry="16" width="216" height="168" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="740" y="384" class="box-title">Three.js Viewer</text>
  <text x="740" y="412" class="box-text">3D 模型显示与交互</text>
  <text x="740" y="438" class="tiny">旋转 / 缩放 / 选择</text>
  <text x="740" y="460" class="tiny">颜色 / 高亮 / 爆炸视图</text>

  <rect x="966" y="350" rx="16" ry="16" width="188" height="168" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="988" y="384" class="box-title">MaxGraph</text>
  <text x="988" y="412" class="box-text">多体拓扑表达</text>
  <text x="988" y="438" class="tiny">关系图 / 结构图</text>
  <text x="988" y="460" class="tiny">导出链路支撑</text>

  <rect x="470" y="548" rx="16" ry="16" width="216" height="186" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="492" y="582" class="box-title">Domain Model</text>
  <text x="492" y="610" class="box-text">`packages/core`</text>
  <text x="492" y="636" class="tiny">Group / Frame / Joint / Motion</text>
  <text x="492" y="658" class="tiny">模型浏览树与约束规则</text>
  <text x="492" y="680" class="tiny">场景对象的语义基础</text>

  <rect x="718" y="548" rx="16" ry="16" width="216" height="186" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="740" y="582" class="box-title">Geometry Runtime</text>
  <text x="740" y="610" class="box-text">`packages/geo`</text>
  <text x="740" y="636" class="tiny">STEP 读取 / 网格化 / 边线</text>
  <text x="740" y="658" class="tiny">质量属性 Worker</text>
  <text x="740" y="680" class="tiny">WASM 封装与调用</text>

  <rect x="966" y="548" rx="16" ry="16" width="188" height="186" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="988" y="582" class="box-title">Scene Delivery</text>
  <text x="988" y="610" class="box-text">PRD / PLAN / QA / Code</text>
  <text x="988" y="636" class="tiny">以 SC01-SC60 为交付单元</text>
  <text x="988" y="658" class="tiny">skill 驱动迭代执行</text>

  <rect x="470" y="764" rx="16" ry="16" width="684" height="92" fill="#ffffff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="492" y="798" class="box-title">Key Product Flow</text>
  <text x="492" y="826" class="box-text">STEP 导入 → OCCT 解析/网格化 → Three.js 可视化 → MBS 场景编辑 → 配置导出 / 拓扑表达 / 测试验证</text>

  <rect x="1240" y="164" rx="20" ry="20" width="272" height="720" fill="url(#panelGreen)" stroke="#86efac" stroke-width="2"/>
  <text x="1264" y="206" class="panel-title">3. Geometry &amp; QA Backbone</text>

  <rect x="1264" y="232" rx="16" ry="16" width="224" height="136" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1286" y="266" class="box-title">OCCT WASM</text>
  <text x="1286" y="294" class="box-text">几何内核核心能力</text>
  <text x="1286" y="320" class="tiny">STEPControl_Reader</text>
  <text x="1286" y="342" class="tiny">BRep / Mesh / Property Calc</text>

  <rect x="1264" y="392" rx="16" ry="16" width="224" height="122" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1286" y="426" class="box-title">WASM Build</text>
  <text x="1286" y="454" class="box-text">CMake + Emscripten</text>
  <text x="1286" y="480" class="tiny">`packages/geo/wasm`</text>

  <rect x="1264" y="538" rx="16" ry="16" width="224" height="146" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1286" y="572" class="box-title">Automated Testing</text>
  <text x="1286" y="600" class="box-text">Unit / Integration / E2E</text>
  <text x="1286" y="626" class="tiny">`packages/*/test`</text>
  <text x="1286" y="648" class="tiny">`tests/unit` `tests/integration`</text>

  <rect x="1264" y="706" rx="16" ry="16" width="224" height="138" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="1286" y="740" class="box-title">Verification Commands</text>
  <text x="1286" y="768" class="box-text">`pnpm build:webview`</text>
  <text x="1286" y="794" class="box-text">`pnpm build:extension`</text>
  <text x="1286" y="820" class="box-text">`pnpm test`</text>

  <path class="flow" d="M384 416 C420 416, 430 416, 470 416"/>
  <path class="flow" d="M826 518 L826 548"/>
  <path class="flow" d="M578 518 L578 548"/>
  <path class="flow" d="M1060 518 L1060 548"/>
  <path class="flow" d="M934 442 C970 442, 990 442, 1030 442 C1120 442, 1150 300, 1264 300"/>
  <path class="flow" d="M826 734 L826 764"/>
  <path class="flow" d="M1488 300 C1520 300, 1520 300, 1520 300"/>
  <path class="flow dashed" d="M1264 610 C1200 610, 1170 610, 1154 610"/>
  <path class="flow dashed" d="M112 581 C76 581, 76 581, 76 581"/>

  <rect x="90" y="904" rx="10" ry="10" width="212" height="34" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="114" cy="921" r="7" fill="#93c5fd"/>
  <text x="130" y="926" class="badge">应用层 / 前端流程</text>

  <rect x="332" y="904" rx="10" ry="10" width="212" height="34" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="356" cy="921" r="7" fill="#86efac"/>
  <text x="372" y="926" class="badge">几何与测试底座</text>

  <rect x="574" y="904" rx="10" ry="10" width="212" height="34" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="598" cy="921" r="7" fill="#fdba74"/>
  <text x="614" y="926" class="badge">VSCode 宿主能力</text>

  <text x="1034" y="926" class="tiny">图中模块与命名依据：README、CLAUDE、project-context、docs/analysis 中的当前架构描述</text>
</svg>
